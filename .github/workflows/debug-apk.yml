name: Signed debug APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    env:
      PLUSX_BACKEND_TOKEN: ${{ secrets.PLUSX_BACKEND_TOKEN }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Restore signing key
        shell: bash
        run: |
          test -n "$PLUSX_BACKEND_TOKEN" || { echo "Missing PLUSX_BACKEND_TOKEN"; exit 1; }
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > plusx-release.keystore
          {
            printf 'storeFile=%s\n' "$GITHUB_WORKSPACE/plusx-release.keystore"
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
          } > signing.properties

      - name: Test and build signed debug APK
        run: |
          chmod +x gradlew scripts/verify-signing-certificate.sh
          ./gradlew --no-daemon test assembleDebug
          scripts/verify-signing-certificate.sh app/build/outputs/apk/debug/app-debug.apk

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlusXMobile-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Remove temporary secrets
        if: always()
        run: rm -f signing.properties plusx-release.keystore
