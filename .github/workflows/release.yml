name: Signed release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PLUSX_BACKEND_TOKEN: ${{ secrets.PLUSX_BACKEND_TOKEN }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Check required secrets
        shell: bash
        run: |
          test -n "$PLUSX_BACKEND_TOKEN" || { echo "Missing PLUSX_BACKEND_TOKEN"; exit 1; }
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Restore signing key
        shell: bash
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > plusx-release.keystore
          {
            printf 'storeFile=%s\n' "$GITHUB_WORKSPACE/plusx-release.keystore"
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
          } > signing.properties

      - name: Verify repository
        run: bash scripts/check-repository.sh

      - name: Test and build signed release
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon test assembleRelease

      - name: Prepare files
        shell: bash
        run: |
          cp app/build/outputs/apk/release/app-release.apk "PlusX-Mobile-${GITHUB_REF_NAME}.apk"
          sha256sum "PlusX-Mobile-${GITHUB_REF_NAME}.apk" > "PlusX-Mobile-${GITHUB_REF_NAME}.apk.sha256"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "PlusX-Mobile-${GITHUB_REF_NAME}.apk" \
            "PlusX-Mobile-${GITHUB_REF_NAME}.apk.sha256" \
            --title "PlusX Mobile $GITHUB_REF_NAME" \
            --generate-notes

      - name: Remove temporary secrets
        if: always()
        shell: bash
        run: rm -f signing.properties plusx-release.keystore
