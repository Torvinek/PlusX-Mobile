name: Android CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    env:
      PLUSX_BACKEND_TOKEN: ${{ secrets.PLUSX_BACKEND_TOKEN }}

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Ustaw JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ustaw Android SDK
        uses: android-actions/setup-android@v3

      - name: Zainstaluj Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Nadaj uprawnienia Gradle
        run: chmod +x gradlew

      - name: Sprawdź repozytorium
        run: bash scripts/check-repository.sh

      - name: Uruchom testy i zbuduj APK
        run: ./gradlew --no-daemon test assembleDebug

      - name: Udostępnij debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PlusX-Mobile-v1.5.1-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
