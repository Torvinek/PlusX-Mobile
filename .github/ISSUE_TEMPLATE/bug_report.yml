name: Zgłoszenie błędu
description: Zgłoś problem z działaniem PlusX Mobile
title: "[Błąd] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Dzięki za zgłoszenie. Nie wpisuj tutaj loginu, hasła, User Key, cookies, pełnych linków M3U ani danych płatniczych.

  - type: input
    id: app-version
    attributes:
      label: Wersja aplikacji
      description: Numer wersji PlusX Mobile, np. 1.5.1
      placeholder: 1.5.1
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Telefon i wersja Androida
      placeholder: Samsung Galaxy A33 5G, Android 14
    validations:
      required: true

  - type: dropdown
    id: screen
    attributes:
      label: Ekran, którego dotyczy problem
      options:
        - Logowanie
        - Ekran główny / saldo
        - Wiadomości
        - Programy na dziś
        - Pakiety
        - Reseller Panel
        - Linki M3U / EPG
        - Doładowanie konta
        - Ustawienia
        - Inny
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Opis problemu
      description: Napisz, co się stało i czego oczekiwałeś.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Kroki do odtworzenia
      placeholder: |
        1. Otwórz...
        2. Kliknij...
        3. Pojawia się...
    validations:
      required: true

  - type: textarea
    id: attachments
    attributes:
      label: Zrzuty ekranu lub dodatkowe informacje
      description: Usuń lub zasłoń wszystkie dane wrażliwe.

  - type: checkboxes
    id: checks
    attributes:
      label: Potwierdzenie
      options:
        - label: Używam najnowszej dostępnej wersji aplikacji.
          required: true
        - label: Zgłoszenie nie zawiera danych logowania, User Key, cookies ani danych płatniczych.
          required: true
