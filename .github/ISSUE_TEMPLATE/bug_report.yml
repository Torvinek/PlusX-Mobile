name: Zgłoszenie błędu
description: Zgłoś błąd w PlusX Mobile
title: "[Błąd] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Nie wklejaj loginu, hasła, cookies, User Key, pełnych linków M3U ani danych płatniczych.
  - type: input
    id: version
    attributes:
      label: Wersja aplikacji
      placeholder: "1.5.1"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Telefon i Android
      placeholder: "Samsung SM-A336B, Android ..."
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Co się stało?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Kroki do odtworzenia
    validations:
      required: true
